<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salt & Smoke</title>
    <link rel="icon" href="assets/img/favicon.svg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-xxl position-relative p-0 ">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 px-lg-5 py-3 py-lg-0 wow fadeIn"
            data-wow-delay="0.1s">
            <a class="navbar-brand p-0 wow fadeIn" data-wow-delay="0.1s" href="index.html">
                <h1 class="text-primary m-0"><i class="fa-solid fa-utensils me-3 "></i>Salt & Smoke</h1>
            </a>
            <button class="navbar-toggler wow fadeIn" data-wow-delay="0.1s" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse"
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="fa-solid fa-bars"></span>
            </button>
            <div class="collapse navbar-collapse wow fadeIn" data-wow-delay="0.1s" id="navbarCollapse">
                <div class="navbar-nav ms-auto py-0 pe-4 wow fadeIn" data-wow-delay="0.1s">
                    <a href="index.html" class="nav-item nav-link">Home</a>
                </div>
            </div>
        </nav>
    </div>
    <div class="container-xxl py-5 bg-dark hero-header mb-5 wow fadeIn" data-wow-delay="0.1s">
        <div class="container my-5 py-5 px-lg-5 px-sm-5 px-0 ">
            <div class="row align-items-center g-5 wow fadeIn">
                <div class="col-lg-6 text-center text-lg-start">
                    <h1 class="display-3 text-white animated slideInLeft">Thank You <br>For Your Reservation</h1>
                    <p class="text-white animated slideInLeft mb-4 pb-2">We appreciate your reservation and look forward
                        to serving you.</p>
                    <div id="reservationConfirmation" class="alert alert-info mt-4" role="alert"
                        aria-live="polite" aria-atomic="true">Checking your reservation details...</div>
                    <a href="index.html" class="btn btn-primary py-sm-3 px-sm-5 animated slideInLeft">Back to Home</a>
                </div>
                <div class="col-lg-6 text-center text-lg-start">
                    <img class="img-fluid rounded-circle py-5 " id="heroImage" src="assets/img/thankyou.png" alt="Thank You Image">
                </div>

            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
    <script>
        new WOW().init();
    </script>
    <script src="main.js"></script>
</body>

</html>
