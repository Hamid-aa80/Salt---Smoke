<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#0f1728">
    Color Scheme
  </text>
  
  <!-- Primary Color -->
  <rect x="50" y="80" width="150" height="150" rx="8" fill="#fea116"/>
  <text x="125" y="195" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f1728">
    Primary
  </text>
  <text x="125" y="215" font-size="12" text-anchor="middle" fill="#666">
    #fea116
  </text>
  <text x="125" y="235" font-size="11" text-anchor="middle" fill="#666">
    Orange
  </text>
  
  <!-- Dark Color -->
  <rect x="325" y="80" width="150" height="150" rx="8" fill="#0f1728"/>
  <text x="400" y="195" font-size="14" font-weight="bold" text-anchor="middle" fill="#fea116">
    Dark
  </text>
  <text x="400" y="215" font-size="12" text-anchor="middle" fill="#aaa">
    #0f1728
  </text>
  <text x="400" y="235" font-size="11" text-anchor="middle" fill="#aaa">
    Navy
  </text>
  
  <!-- Light Color -->
  <rect x="600" y="80" width="150" height="150" rx="8" fill="#f1f8ff" stroke="#ccc" stroke-width="2"/>
  <text x="675" y="195" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f1728">
    Light
  </text>
  <text x="675" y="215" font-size="12" text-anchor="middle" fill="#666">
    #f1f8ff
  </text>
  <text x="675" y="235" font-size="11" text-anchor="middle" fill="#666">
    Alice Blue
  </text>
</svg>
